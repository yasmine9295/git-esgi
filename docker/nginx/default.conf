server {
    listen 80;
    server_name localhost;
    root /var/www/laravel/public;
    index index.php index.html index.htm;

    # Gérer les routes Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Traitement des fichiers PHP
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;                 # Utiliser le nom du service PHP dans Docker
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Sécuriser les fichiers cachés
    location ~ /\.ht {
        deny all;
    }

    # Timeout plus long pour éviter les erreurs pendant le dev
    client_max_body_size 20M;
}